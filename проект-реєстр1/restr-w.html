<html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeroFit – Увійти</title>
  <link rel="stylesheet" href="restr-b.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">

    <div class="logo-hero">
      <div class="logo-wrapper">
        <div class="pulse-ring"></div>
        <img src="лого.png" alt="HeroFit Logo" class="hero-logo">
      </div>
      <div class="logo-text">HeroFit</div>
    </div>

    <h1 class="welcome-title">З поверненням!</h1>
    <p class="subtitle">Увійдіть, щоб продовжити свою подорож</p>

      <form id="login-form">
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <img src="імейл.png" alt="" class="input-icon">
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <div class="input-wrapper">
          <img src="замок.png" alt="" class="input-icon">
          <input type="password" id="password" placeholder="........." required>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Увійти
        <img src="arrow.png" alt="→" class="btn-arrow">
      </button>
    </form>

    <div class="divider"><span>або</span></div>

    <div class="register-text">
      Ще не маєте акаунта? <a href="#">Зареєструватися</a>
    </div>

    <a href="#" class="back-link">
      <img src="arrow-back.png" alt="←" class="back-icon">
      Повернутися на головну
    </a>

    </div>

    <div class="hint">
      <img src="lampocha.png" alt="💡" class="hint-icon">
      Підказка: Просто зареєструйтесь з будь-яким email
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            alert('Будь ласка, заповніть всі поля');
            return;
        }

        const btn = loginForm.querySelector('.btn-login');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Входимо...';
        btn.disabled = true;

        try {
            await new Promise(resolve => setTimeout(resolve, 800));

            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);

            alert('✅ Успішний вхід! Ласкаво просимо до HeroFit 🔥');
            window.location.href = 'page-off.html';

        } catch (err) {
            alert('❌ Щось пішло не так. Перевірте дані.');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });
  </script>

</body>
</html>
